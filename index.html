<!DOCTYPE html>
<html lang="nl">
<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1.0" />
  <title>Tandwielwerkplaats</title>
  <style>
    :root {
      --bg: #dff3ff;
      --wall: #8fd3f4;
      --wall-dark: #62b6df;
      --card: #fff6da;
      --ink: #12355b;
      --blue: #2389f2;
      --green: #70c91f;
      --yellow: #ffd22e;
      --orange: #ff8a18;
      --purple: #9b45e8;
      --red: #f05c5c;
      --shadow: 0 16px 32px rgba(14, 49, 78, 0.22);
      --soft-shadow: 0 8px 18px rgba(14, 49, 78, 0.16);
    }

    * { box-sizing: border-box; }

    html, body { height: 100%; }

    body {
      margin: 0;
      font-family: "Trebuchet MS", system-ui, sans-serif;
      color: var(--ink);
      background: linear-gradient(180deg, #ffeebd, #d6f4ff);
      display: flex;
      align-items: center;
      justify-content: center;
      overflow: hidden;
      user-select: none;
      -webkit-tap-highlight-color: transparent;
    }

    button {
      font-family: inherit;
      border: 0;
      cursor: pointer;
      touch-action: manipulation;
    }

    .game {
      width: min(100vw, 1600px);
      height: min(100vh, 900px);
      aspect-ratio: 16 / 9;
      max-height: 100vh;
      background: linear-gradient(180deg, #9fd9f5 0%, #71c0e6 68%, #5daed7 100%);
      border-radius: clamp(0px, 1.4vw, 28px);
      overflow: hidden;
      position: relative;
      box-shadow: var(--shadow);
    }

    .wall-grid {
      position: absolute;
      inset: 0;
      background-image:
        linear-gradient(rgba(18, 53, 91, 0.08) 2px, transparent 2px),
        linear-gradient(90deg, rgba(18, 53, 91, 0.08) 2px, transparent 2px);
      background-size: 220px 145px;
      opacity: 0.55;
    }

    .pipe, .pipe2, .pipe3 {
      position: absolute;
      background: rgba(44, 96, 126, 0.25);
      border: 4px solid rgba(18, 53, 91, 0.12);
      border-radius: 999px;
    }

    .pipe { width: 14px; height: 34%; right: 8%; top: 12%; }
    .pipe2 { width: 24%; height: 12px; right: 8%; top: 12%; }
    .pipe3 { width: 14px; height: 18%; left: 10%; top: 0; }

    .lamp {
      position: absolute;
      left: 7%;
      top: 6%;
      width: 118px;
      height: 70px;
      background: #244761;
      border-radius: 0 0 65px 65px;
      box-shadow: 0 18px 45px rgba(255, 244, 171, 0.5);
    }

    .lamp::after {
      content: "";
      position: absolute;
      left: 18px;
      right: 18px;
      bottom: -12px;
      height: 20px;
      background: rgba(255, 247, 176, 0.85);
      border-radius: 50%;
      filter: blur(2px);
    }

    .workbench {
      position: absolute;
      right: 5%;
      bottom: 9%;
      width: 190px;
      height: 90px;
      background: #9a6125;
      border-radius: 18px 18px 8px 8px;
      box-shadow: var(--soft-shadow);
      opacity: 0.75;
    }

    .wrench {
      position: absolute;
      right: 12%;
      top: 43%;
      font-size: clamp(42px, 5vw, 70px);
      opacity: 0.42;
      transform: rotate(-14deg);
    }

    .robot {
      position: absolute;
      left: clamp(10px, 3vw, 34px);
      bottom: clamp(8px, 2vw, 28px);
      width: clamp(122px, 17vw, 230px);
      height: clamp(132px, 18vw, 250px);
      z-index: 5;
      pointer-events: none;
    }

    .robot-head {
      position: absolute;
      left: 18%;
      top: 0;
      width: 64%;
      height: 44%;
      background: #f7fbff;
      border-radius: 34% 34% 28% 28%;
      box-shadow: var(--soft-shadow);
    }

    .robot-face {
      position: absolute;
      inset: 18% 12%;
      background: #102033;
      border-radius: 30px;
    }

    .eye {
      position: absolute;
      top: 32%;
      width: 17%;
      aspect-ratio: 1;
      background: white;
      border-radius: 50%;
      animation: blink 4s infinite;
    }

    .eye.left { left: 27%; }
    .eye.right { right: 27%; }

    .smile {
      position: absolute;
      left: 34%;
      bottom: 22%;
      width: 32%;
      height: 16%;
      border-bottom: 5px solid white;
      border-radius: 0 0 999px 999px;
    }

    .robot-body {
      position: absolute;
      left: 30%;
      top: 45%;
      width: 40%;
      height: 38%;
      background: #f7fbff;
      border-radius: 26px;
      box-shadow: var(--soft-shadow);
    }

    .robot-body::after {
      content: "⚙";
      position: absolute;
      inset: 24% 28%;
      display: grid;
      place-items: center;
      background: #2d9bf0;
      color: white;
      border-radius: 12px;
      font-size: clamp(18px, 3vw, 34px);
    }

    .thumb {
      position: absolute;
      right: 2%;
      top: 44%;
      font-size: clamp(34px, 5vw, 72px);
      transform: rotate(-8deg);
    }

    @keyframes blink {
      0%, 92%, 100% { transform: scaleY(1); }
      95% { transform: scaleY(0.12); }
    }

    .topbar {
      position: absolute;
      inset: clamp(12px, 2vw, 28px) clamp(12px, 2vw, 28px) auto;
      display: grid;
      grid-template-columns: auto 1fr auto auto auto;
      gap: clamp(8px, 1.2vw, 18px);
      align-items: center;
      z-index: 10;
    }

    .round-btn, .small-pill, .title-sign, .stars {
      box-shadow: var(--soft-shadow);
      border: 5px solid rgba(255, 255, 255, 0.75);
    }

    .round-btn {
      width: clamp(54px, 6vw, 84px);
      aspect-ratio: 1;
      border-radius: 50%;
      background: linear-gradient(180deg, #ffd65c, #ffb028);
      color: #113760;
      font-size: clamp(24px, 3.8vw, 44px);
      display: grid;
      place-items: center;
    }

    .title-sign {
      justify-self: center;
      min-width: min(410px, 42vw);
      background: var(--card);
      border-radius: 24px;
      padding: clamp(10px, 1.3vw, 18px) clamp(18px, 2.8vw, 44px);
      text-align: center;
      font-size: clamp(28px, 4.2vw, 58px);
      font-weight: 900;
      letter-spacing: 0.02em;
    }

    .stars {
      display: flex;
      align-items: center;
      gap: clamp(4px, 0.7vw, 10px);
      border-radius: 22px;
      background: var(--card);
      padding: clamp(8px, 1vw, 14px) clamp(10px, 1.4vw, 18px);
      font-size: clamp(26px, 3.5vw, 46px);
      line-height: 1;
    }

    .star.off { filter: grayscale(1); opacity: 0.38; }

    .small-pill {
      border-radius: 20px;
      background: var(--card);
      padding: clamp(8px, 1vw, 14px) clamp(12px, 1.5vw, 20px);
      font-size: clamp(20px, 2.4vw, 34px);
      font-weight: 900;
      min-width: 86px;
      text-align: center;
    }

    .switch {
      background: rgba(255,255,255,0.82);
      border: 4px solid rgba(255,255,255,0.8);
      border-radius: 18px;
      padding: clamp(7px, 0.9vw, 12px) clamp(9px, 1vw, 15px);
      font-size: clamp(18px, 2vw, 28px);
      font-weight: 900;
      box-shadow: var(--soft-shadow);
    }

    .switch.active { background: #d9f99d; }

    .gear-stage {
      position: absolute;
      left: clamp(24px, 4vw, 74px);
      right: clamp(24px, 4vw, 74px);
      top: 28%;
      height: 32%;
      display: flex;
      align-items: center;
      justify-content: center;
      z-index: 4;
    }

    .gear-row {
      display: flex;
      align-items: center;
      justify-content: center;
      gap: 0;
      width: 100%;
      padding-left: clamp(80px, 12vw, 190px);
    }

    .gear-wrap {
      position: relative;
      width: var(--size);
      aspect-ratio: 1;
      margin-left: calc(var(--size) * -0.06);
      margin-right: calc(var(--size) * -0.06);
      display: grid;
      place-items: center;
    }

    .gear {
      width: 100%;
      height: 100%;
      border-radius: 50%;
      position: relative;
      color: var(--gear-color);
      background:
        radial-gradient(circle at center, #243140 0 9%, #0f172a 9.5% 14%, transparent 14.5%),
        radial-gradient(circle at 35% 30%, rgba(255,255,255,0.45), transparent 20%),
        repeating-conic-gradient(from 0deg, currentColor 0deg 9deg, transparent 9deg 18deg),
        radial-gradient(circle at center, currentColor 0 57%, transparent 58%);
      filter: drop-shadow(0 12px 10px rgba(18,53,91,0.24));
    }

    .gear::before {
      content: "";
      position: absolute;
      inset: 21%;
      border-radius: 50%;
      background: rgba(255,255,255,0.78);
      border: clamp(5px, 0.8vw, 10px) solid currentColor;
    }

    .gear.target {
      outline: clamp(6px, 0.8vw, 12px) solid rgba(255,255,255,0.82);
      outline-offset: clamp(6px, 0.8vw, 12px);
      filter: drop-shadow(0 0 18px rgba(199, 91, 255, 0.86)) drop-shadow(0 14px 12px rgba(18,53,91,0.22));
    }

    .gear-target-mark {
      position: absolute;
      inset: 0;
      display: grid;
      place-items: center;
      font-size: calc(var(--size) * 0.45);
      color: white;
      font-weight: 900;
      text-shadow: 0 4px 8px rgba(44, 21, 80, 0.42);
      z-index: 3;
      pointer-events: none;
    }

    .arrow-marker {
      position: absolute;
      inset: 0;
      display: grid;
      place-items: center;
      z-index: 3;
      pointer-events: none;
    }

    .arrow-disc {
      width: 62%;
      aspect-ratio: 1;
      border-radius: 50%;
      display: grid;
      place-items: center;
      font-size: calc(var(--size) * 0.42);
      color: white;
      text-shadow: 0 4px 8px rgba(0,0,0,0.25);
      animation-duration: 1.25s;
      animation-iteration-count: infinite;
      animation-timing-function: linear;
    }

    .spin-right { animation-name: spinRight; }
    .spin-left { animation-name: spinLeft; }

    .gear.spin-right { animation: spinRight 1.25s linear infinite; }
    .gear.spin-left { animation: spinLeft 1.25s linear infinite; }

    @keyframes spinRight { to { transform: rotate(360deg); } }
    @keyframes spinLeft { to { transform: rotate(-360deg); } }

    .highlight {
      animation: pulse 0.8s ease-in-out 2;
    }

    @keyframes pulse {
      0%, 100% { transform: scale(1); }
      50% { transform: scale(1.08); }
    }

    .answer-zone {
      position: absolute;
      left: 50%;
      bottom: clamp(22px, 4vw, 58px);
      transform: translateX(-50%);
      display: flex;
      gap: clamp(18px, 3vw, 44px);
      align-items: center;
      justify-content: center;
      z-index: 12;
    }

    .answer {
      width: clamp(160px, 20vw, 320px);
      height: clamp(88px, 10vw, 150px);
      border-radius: 28px;
      display: grid;
      place-items: center;
      color: white;
      font-size: clamp(58px, 8vw, 120px);
      font-weight: 900;
      border: 6px solid rgba(255,255,255,0.72);
      box-shadow: var(--shadow);
      transition: transform 0.08s ease, filter 0.15s ease;
    }

    .answer:active { transform: scale(0.97); }
    .answer.left { background: linear-gradient(180deg, #8edb3d, #55b81b); }
    .answer.right { background: linear-gradient(180deg, #47a7ff, #1675df); }
    .answer .spin-icon { display: inline-block; animation-duration: 1.05s; animation-iteration-count: infinite; animation-timing-function: linear; }
    .answer.left .spin-icon { animation-name: spinLeft; }
    .answer.right .spin-icon { animation-name: spinRight; }

    .feedback {
      position: absolute;
      left: 50%;
      top: 19%;
      transform: translateX(-50%) scale(0.9);
      opacity: 0;
      pointer-events: none;
      z-index: 20;
      background: #fff7de;
      border: 5px solid rgba(255,255,255,0.85);
      border-radius: 34px;
      padding: clamp(10px, 1.4vw, 18px) clamp(24px, 3vw, 44px);
      font-size: clamp(34px, 5vw, 72px);
      font-weight: 900;
      box-shadow: var(--shadow);
      transition: opacity 0.2s ease, transform 0.2s ease;
    }

    .feedback.show {
      opacity: 1;
      transform: translateX(-50%) scale(1);
    }

    .feedback.good { color: #20812e; }
    .feedback.try { color: #b45309; }

    .sparkles {
      position: absolute;
      inset: 0;
      pointer-events: none;
      z-index: 18;
      overflow: hidden;
    }

    .sparkle {
      position: absolute;
      font-size: clamp(24px, 3vw, 46px);
      animation: pop 0.85s ease-out forwards;
    }

    @keyframes pop {
      0% { transform: scale(0.2) translateY(20px); opacity: 0; }
      30% { opacity: 1; }
      100% { transform: scale(1.2) translateY(-50px); opacity: 0; }
    }

    .bottom-tools {
      position: absolute;
      right: clamp(12px, 2vw, 28px);
      bottom: clamp(12px, 2vw, 28px);
      display: flex;
      gap: 10px;
      z-index: 22;
    }

    .tool-btn {
      min-width: clamp(54px, 6vw, 82px);
      height: clamp(48px, 5.6vw, 70px);
      border-radius: 18px;
      background: rgba(255,255,255,0.86);
      border: 4px solid rgba(255,255,255,0.78);
      font-size: clamp(22px, 2.8vw, 36px);
      box-shadow: var(--soft-shadow);
      font-weight: 900;
    }

    .mode-menu {
      position: absolute;
      left: 50%;
      bottom: clamp(22px, 4vw, 58px);
      transform: translateX(-50%);
      display: flex;
      gap: clamp(18px, 3vw, 38px);
      z-index: 30;
    }

    .mode-card {
      width: clamp(210px, 26vw, 360px);
      height: clamp(140px, 16vw, 220px);
      border-radius: 34px;
      border: 7px solid rgba(255,255,255,0.78);
      box-shadow: var(--shadow);
      background: var(--card);
      display: grid;
      place-items: center;
      font-size: clamp(30px, 4vw, 62px);
      font-weight: 900;
      color: var(--ink);
    }

    .mode-card span {
      display: block;
      font-size: clamp(58px, 7vw, 112px);
      line-height: 1;
      margin-bottom: 4px;
    }

    .hidden { display: none !important; }

    .teacher-panel {
      position: absolute;
      right: clamp(12px, 2vw, 28px);
      top: clamp(94px, 11vw, 138px);
      z-index: 25;
      background: rgba(255,246,218,0.96);
      border: 5px solid rgba(255,255,255,0.82);
      box-shadow: var(--shadow);
      border-radius: 24px;
      padding: 14px;
      display: grid;
      gap: 10px;
      width: min(280px, 30vw);
    }

    .teacher-panel button {
      border-radius: 18px;
      padding: 13px;
      font-size: clamp(18px, 1.8vw, 25px);
      font-weight: 900;
      background: white;
      color: var(--ink);
      box-shadow: var(--soft-shadow);
    }

    .meter {
      position: absolute;
      left: 50%;
      bottom: 20%;
      transform: translateX(-50%);
      width: min(520px, 42vw);
      height: 18px;
      border-radius: 999px;
      background: rgba(255,255,255,0.5);
      overflow: hidden;
      box-shadow: inset 0 2px 7px rgba(0,0,0,0.12);
      z-index: 7;
    }

    .meter-fill {
      width: var(--energy);
      height: 100%;
      background: linear-gradient(90deg, #ffca2e, #8ddd2a);
      border-radius: inherit;
      transition: width 0.4s ease;
    }

    @media (max-width: 900px) {
      .topbar {
        grid-template-columns: auto 1fr auto auto;
      }
      .switch.teacher-toggle { display: none; }
      .gear-stage { top: 30%; }
      .gear-row { padding-left: 80px; }
      .robot { opacity: 0.95; }
      .workbench, .wrench { opacity: 0.35; }
    }

    @media (max-width: 650px) {
      .title-sign { min-width: 0; }
      .stars { display: none; }
      .answer-zone { bottom: 12px; }
      .answer { width: 42vw; }
      .robot { width: 104px; height: 118px; }
    }
  </style>
</head>
<body>
  <main class="game" id="game">
    <div class="wall-grid"></div>
    <div class="pipe"></div><div class="pipe2"></div><div class="pipe3"></div>
    <div class="lamp"></div>
    <div class="workbench"></div>
    <div class="wrench">🔧</div>
    <div class="sparkles" id="sparkles"></div>

    <section class="topbar">
      <button class="round-btn" id="helpBtn" aria-label="hulp">💡</button>
      <div class="title-sign" id="title">Kies!</div>
      <div class="stars" id="stars" aria-label="sterren"><span>⭐</span><span>⭐</span><span class="star off">⭐</span></div>
      <div class="small-pill" id="count">0</div>
      <button class="switch teacher-toggle" id="teacherBtn">Juf</button>
    </section>

    <section class="gear-stage">
      <div class="gear-row" id="gearRow"></div>
    </section>

    <div class="meter" aria-hidden="true"><div class="meter-fill" id="energy" style="--energy: 0%"></div></div>

    <div class="robot" aria-hidden="true">
      <div class="robot-head"><div class="robot-face"><div class="eye left"></div><div class="eye right"></div><div class="smile"></div></div></div>
      <div class="robot-body"></div>
      <div class="thumb">👍</div>
    </div>

    <div class="feedback" id="feedback">Goed!</div>

    <section class="answer-zone" id="answers">
      <button class="answer left" id="leftAnswer" aria-label="linksom"><span class="spin-icon">↺</span></button>
      <button class="answer right" id="rightAnswer" aria-label="rechtsom"><span class="spin-icon">↻</span></button>
    </section>

    <section class="mode-menu" id="modeMenu">
      <button class="mode-card" id="exploreMode"><span>⚙️</span>Ontdek</button>
      <button class="mode-card" id="predictMode"><span>❔</span>Kies</button>
    </section>

    <section class="teacher-panel hidden" id="teacherPanel">
      <button id="checkLaterBtn">Bespreek</button>
      <button id="showAnswerBtn">Toon</button>
      <button id="newPuzzleBtn">Nieuw</button>
      <button id="fullBtn">Vol scherm</button>
    </section>

    <section class="bottom-tools">
      <button class="tool-btn" id="soundBtn" aria-label="geluid">🔈</button>
      <button class="tool-btn" id="resetBtn" aria-label="opnieuw">↺</button>
    </section>
  </main>

  <script>
    const colors = ['#70c91f', '#ffd22e', '#36a8ff', '#ff8a18', '#9b45e8', '#ff5f8f', '#2dd4bf'];
    const sizes = [1.08, 0.92, 1.0, 0.78, 1.04, 0.88, 0.96];
    let mode = null;
    let level = 1;
    let score = 0;
    let streak = 0;
    let soundOn = true;
    let teacherMode = false;
    let discussMode = false;
    let answered = false;
    let puzzle = null;
    let audioCtx = null;

    const gearRow = document.getElementById('gearRow');
    const feedback = document.getElementById('feedback');
    const stars = document.getElementById('stars');
    const count = document.getElementById('count');
    const energy = document.getElementById('energy');
    const title = document.getElementById('title');
    const answers = document.getElementById('answers');
    const modeMenu = document.getElementById('modeMenu');
    const teacherPanel = document.getElementById('teacherPanel');

    function makePuzzle() {
      const maxGears = Math.min(3 + Math.floor(level / 2), 7);
      const minGears = mode === 'explore' ? 2 : Math.min(2 + Math.floor(level / 4), 4);
      const gears = randomInt(minGears, maxGears);
      const start = Math.random() > 0.5 ? 'right' : 'left';
      const targetIndex = mode === 'explore' ? randomInt(1, gears - 1) : gears - 1;
      return { gears, start, targetIndex };
    }

    function directionFor(index) {
      const same = index % 2 === 0;
      if (same) return puzzle.start;
      return puzzle.start === 'right' ? 'left' : 'right';
    }

    function renderPuzzle({ revealAll = false } = {}) {
      puzzle = puzzle || makePuzzle();
      gearRow.innerHTML = '';
      const base = Math.max(72, Math.min(window.innerWidth * 0.13, 170));

      for (let i = 0; i < puzzle.gears; i++) {
        const wrap = document.createElement('div');
        const size = base * sizes[i % sizes.length];
        wrap.className = 'gear-wrap';
        wrap.style.setProperty('--size', `${size}px`);
        wrap.style.setProperty('--gear-color', i === puzzle.targetIndex ? colors[4] : colors[i % colors.length]);

        const gear = document.createElement('div');
        gear.className = 'gear';
        if (i === puzzle.targetIndex && mode === 'predict' && !revealAll) gear.classList.add('target');
        gear.dataset.index = i;
        gear.dataset.dir = directionFor(i);

        const showArrow = revealAll || mode === 'explore' || i === 0 || (answered && mode === 'predict');
        if (showArrow) {
          gear.classList.add(directionFor(i) === 'right' ? 'spin-right' : 'spin-left');
        }

        wrap.appendChild(gear);

        if (showArrow) {
          const marker = document.createElement('div');
          marker.className = 'arrow-marker';
          const disc = document.createElement('div');
          disc.className = `arrow-disc ${directionFor(i) === 'right' ? 'spin-right' : 'spin-left'}`;
          disc.textContent = directionFor(i) === 'right' ? '↻' : '↺';
          marker.appendChild(disc);
          wrap.appendChild(marker);
        }

        if (mode === 'predict' && i === puzzle.targetIndex && !answered && !revealAll) {
          const mark = document.createElement('div');
          mark.className = 'gear-target-mark';
          mark.textContent = '?';
          wrap.appendChild(mark);
        }

        wrap.addEventListener('pointerdown', () => {
          if (mode !== 'explore') return;
          gear.classList.toggle(directionFor(i) === 'right' ? 'spin-right' : 'spin-left');
          popGear(wrap);
          playTone(420, 0.06);
        });

        gearRow.appendChild(wrap);
      }

      updateHud();
    }

    function updateHud() {
      if (!mode) {
        title.textContent = 'Tandwielen';
        count.textContent = '▶';
        answers.classList.add('hidden');
        return;
      }
      title.textContent = mode === 'explore' ? 'Ontdek' : 'Kies!';
      count.textContent = String(score);
      answers.classList.toggle('hidden', mode === 'explore');
      const filled = Math.min(streak, 3);
      stars.innerHTML = [0,1,2].map(i => `<span class="${i < filled ? '' : 'star off'}">⭐</span>`).join('');
      energy.style.setProperty('--energy', `${Math.min((streak / 5) * 100, 100)}%`);
    }

    function choose(dir) {
      if (mode !== 'predict' || answered) return;
      if (discussMode) {
        showFeedback('Denk...', 'try');
        return;
      }
      const correct = directionFor(puzzle.targetIndex);
      answered = true;
      if (dir === correct) {
        score++;
        streak++;
        showFeedback('Goed!', 'good');
        spark();
        playSuccess();
      } else {
        streak = 0;
        showFeedback('Bijna!', 'try');
        playWrong();
      }
      renderPuzzle({ revealAll: true });
      setTimeout(nextRound, dir === correct ? 1200 : 1600);
    }

    function nextRound() {
      answered = false;
      level = Math.max(1, Math.floor(score / 3) + 1);
      puzzle = makePuzzle();
      hideFeedback();
      renderPuzzle();
    }

    function showHelp() {
      if (!mode) return;
      if (mode === 'explore') {
        showFeedback('Draai!', 'good');
        document.querySelectorAll('.gear').forEach(g => g.classList.add(g.dataset.dir === 'right' ? 'spin-right' : 'spin-left'));
        playTone(520, 0.08);
        return;
      }
      animateSteps();
    }

    function animateSteps() {
      const wraps = [...document.querySelectorAll('.gear-wrap')];
      wraps.forEach(w => w.classList.remove('highlight'));
      let i = 0;
      const limit = puzzle.targetIndex;
      const timer = setInterval(() => {
        wraps[i]?.classList.add('highlight');
        playTone(360 + i * 60, 0.05);
        i++;
        if (i > limit) clearInterval(timer);
      }, 420);
    }

    function showAnswer() {
      if (!mode) return;
      answered = true;
      showFeedback(directionFor(puzzle.targetIndex) === 'right' ? '↻' : '↺', 'good');
      renderPuzzle({ revealAll: true });
    }

    function showFeedback(text, type) {
      feedback.textContent = text;
      feedback.className = `feedback show ${type}`;
    }

    function hideFeedback() {
      feedback.className = 'feedback';
    }

    function spark() {
      const layer = document.getElementById('sparkles');
      const icons = ['⭐', '✨', '⚙️'];
      for (let i = 0; i < 12; i++) {
        const s = document.createElement('div');
        s.className = 'sparkle';
        s.textContent = icons[i % icons.length];
        s.style.left = `${randomInt(42, 74)}%`;
        s.style.top = `${randomInt(24, 50)}%`;
        s.style.animationDelay = `${i * 0.04}s`;
        layer.appendChild(s);
        setTimeout(() => s.remove(), 1100);
      }
    }

    function popGear(wrap) {
      wrap.classList.remove('highlight');
      void wrap.offsetWidth;
      wrap.classList.add('highlight');
    }

    function startMode(nextMode) {
      mode = nextMode;
      score = 0;
      streak = 0;
      level = 1;
      answered = false;
      discussMode = false;
      modeMenu.classList.add('hidden');
      puzzle = makePuzzle();
      hideFeedback();
      renderPuzzle({ revealAll: mode === 'explore' });
    }

    function resetGame() {
      mode = null;
      puzzle = null;
      score = 0;
      streak = 0;
      level = 1;
      answered = false;
      discussMode = false;
      hideFeedback();
      gearRow.innerHTML = '';
      modeMenu.classList.remove('hidden');
      updateHud();
    }

    function randomInt(min, max) {
      return Math.floor(Math.random() * (max - min + 1)) + min;
    }

    function getAudio() {
      if (!audioCtx) audioCtx = new (window.AudioContext || window.webkitAudioContext)();
      return audioCtx;
    }

    function playTone(freq, duration = 0.1, type = 'sine') {
      if (!soundOn) return;
      const ctx = getAudio();
      const osc = ctx.createOscillator();
      const gain = ctx.createGain();
      osc.type = type;
      osc.frequency.value = freq;
      gain.gain.setValueAtTime(0.001, ctx.currentTime);
      gain.gain.exponentialRampToValueAtTime(0.12, ctx.currentTime + 0.01);
      gain.gain.exponentialRampToValueAtTime(0.001, ctx.currentTime + duration);
      osc.connect(gain).connect(ctx.destination);
      osc.start();
      osc.stop(ctx.currentTime + duration + 0.02);
    }

    function playSuccess() {
      playTone(520, 0.08);
      setTimeout(() => playTone(660, 0.08), 90);
      setTimeout(() => playTone(820, 0.12), 180);
    }

    function playWrong() {
      playTone(240, 0.12, 'triangle');
      setTimeout(() => playTone(210, 0.12, 'triangle'), 130);
    }

    document.getElementById('exploreMode').addEventListener('click', () => startMode('explore'));
    document.getElementById('predictMode').addEventListener('click', () => startMode('predict'));
    document.getElementById('leftAnswer').addEventListener('click', () => choose('left'));
    document.getElementById('rightAnswer').addEventListener('click', () => choose('right'));
    document.getElementById('helpBtn').addEventListener('click', showHelp);
    document.getElementById('resetBtn').addEventListener('click', resetGame);
    document.getElementById('soundBtn').addEventListener('click', () => {
      soundOn = !soundOn;
      document.getElementById('soundBtn').textContent = soundOn ? '🔈' : '🔇';
      if (soundOn) playTone(500, 0.06);
    });
    document.getElementById('teacherBtn').addEventListener('click', () => {
      teacherMode = !teacherMode;
      teacherPanel.classList.toggle('hidden', !teacherMode);
      document.getElementById('teacherBtn').classList.toggle('active', teacherMode);
    });
    document.getElementById('checkLaterBtn').addEventListener('click', () => {
      discussMode = !discussMode;
      document.getElementById('checkLaterBtn').classList.toggle('active', discussMode);
      showFeedback(discussMode ? 'Denk...' : 'Kies!', 'try');
    });
    document.getElementById('showAnswerBtn').addEventListener('click', showAnswer);
    document.getElementById('newPuzzleBtn').addEventListener('click', nextRound);
    document.getElementById('fullBtn').addEventListener('click', () => {
      const el = document.documentElement;
      if (!document.fullscreenElement && el.requestFullscreen) el.requestFullscreen();
      else if (document.exitFullscreen) document.exitFullscreen();
    });

    window.addEventListener('resize', () => {
      if (mode) renderPuzzle({ revealAll: mode === 'explore' || answered });
    });

    updateHud();
  </script>
</body>
</html>
