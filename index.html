<!doctype html>
<html lang="nl">
<head>
  <meta charset="utf-8">
  <meta name="viewport" content="width=device-width, initial-scale=1, viewport-fit=cover">
  <title>Tandwielwerkplaats</title>
  <link rel="stylesheet" href="style.css">
</head>
<body>
  <main id="app" class="app">
    <img class="background" src="assets/background-workshop.svg" alt="">

    <header class="topbar">
      <button id="homeBtn" class="icon-btn" aria-label="menu">⌂</button>
      <div id="titleSign" class="title-sign">Tandwielen</div>
      <button id="teacherBtn" class="small-btn">Juf</button>
      <button id="soundBtn" class="icon-btn" aria-label="geluid">🔈</button>
      <button id="fullBtn" class="icon-btn" aria-label="volledig scherm">⛶</button>
    </header>

    <section id="menu" class="menu">
      <button id="discoverBtn" class="mode-card">
        <span>⚙️</span>
        <b>Ontdek</b>
      </button>
      <button id="predictBtn" class="mode-card">
        <span>❔</span>
        <b>Kies</b>
      </button>
    </section>

    <canvas id="gearCanvas" class="gear-canvas" aria-label="tandwielveld"></canvas>

    <img class="robot" src="assets/robot.svg" alt="robot">

    <section id="predictControls" class="answer-zone hidden">
      <button id="leftBtn" class="answer left" aria-label="linksom"><span>↺</span></button>
      <button id="rightBtn" class="answer right" aria-label="rechtsom"><span>↻</span></button>
    </section>

    <section id="discoverTray" class="tray hidden">
      <button id="addGearBtn" class="small-btn">+ ⚙️</button>
      <button id="resetBtn" class="small-btn">↺</button>
    </section>

    <aside id="teacherPanel" class="teacher-panel hidden">
      <button id="slowBtn">Langzaam</button>
      <button id="showBtn">Toon</button>
      <button id="newBtn">Nieuw</button>
    </aside>

    <div id="feedback" class="feedback hidden">Goed!</div>
  </main>

  <script src="game.js"></script>
</body>
</html>
