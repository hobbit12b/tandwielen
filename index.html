<!DOCTYPE html>
<html lang="nl">
<head>
  <meta charset="utf-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1, viewport-fit=cover, user-scalable=no" />
  <title>Tandwielenwerkplaats</title>
  <link rel="stylesheet" href="style.css" />
</head>
<body>
  <main id="app" aria-label="Tandwielenwerkplaats">
    <canvas id="gameCanvas" aria-label="Tandwielspel"></canvas>

    <div class="topbar" aria-label="Spelkeuze">
      <button id="discoverBtn" class="mode active" type="button">Ontdek</button>
      <button id="chooseBtn" class="mode" type="button">Kies</button>
    </div>

    <section id="choosePanel" class="choose-panel" aria-label="Kies de draairichting" hidden>
      <button id="leftBtn" class="answer" type="button" aria-label="Linksom"><span>↺</span></button>
      <button id="rightBtn" class="answer" type="button" aria-label="Rechtsom"><span>↻</span></button>
    </section>

    <div id="feedback" class="feedback" aria-live="polite"></div>
  </main>
  <script src="game.js"></script>
</body>
</html>
