<!DOCTYPE html>
<html lang="nl">
<head>
  <meta charset="utf-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1, viewport-fit=cover, user-scalable=no" />
  <title>Tandwielenwerkplaats</title>
  <link rel="stylesheet" href="style.css" />
</head>
<body>
  <main id="app" aria-label="Tandwielenwerkplaats">
    <canvas id="gameCanvas" aria-label="Tandwielspel"></canvas>

    <section id="mainMenu" class="main-menu" aria-label="Hoofdmenu">
      <div class="menu-card">
        <h1>Tandwielen</h1>
        <div class="menu-actions">
          <button id="menuDiscoverBtn" class="menu-choice discover-choice" type="button">
            <span>Ontdekken</span>
            <small>Vrij spelen</small>
          </button>
          <button id="menuSolveBtn" class="menu-choice solve-choice" type="button">
            <span>Oplossen</span>
            <small>Puzzel</small>
          </button>
        </div>
      </div>
    </section>

    <div id="gameHud" class="game-hud" hidden>
      <button id="backBtn" class="hud-button" type="button">Menu</button>
      <div id="levelBadge" class="level-badge" aria-live="polite" hidden></div>
      <button id="resetBtn" class="hud-button" type="button" hidden>Reset</button>
    </div>

    <button id="nextBtn" class="next-button" type="button" hidden>Volgende</button>
    <div id="feedback" class="feedback" aria-live="polite"></div>
  </main>
  <script src="game.js"></script>
</body>
</html>
